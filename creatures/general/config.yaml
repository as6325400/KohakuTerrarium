name: general
version: "1.0"

controller:
  model: gpt-5.4
  auth_mode: codex-oauth
  temperature: 0.5
  max_tokens: 512000
  reasoning_effort: high
  tool_format: native

system_prompt_file: prompts/system.md
skill_mode: dynamic

tools:
  - { name: bash, type: builtin }
  - { name: python, type: builtin }
  - { name: read, type: builtin }
  - { name: write, type: builtin }
  - { name: edit, type: builtin }
  - { name: glob, type: builtin }
  - { name: grep, type: builtin }
  - { name: tree, type: builtin }
  - { name: think, type: builtin }
  - { name: scratchpad, type: builtin }
  - { name: info, type: builtin }
  - { name: ask_user, type: builtin }
  - { name: http, type: builtin }
  - { name: json_read, type: builtin }
  - { name: json_write, type: builtin }
  - { name: send_message, type: builtin }
  - { name: wait_channel, type: builtin }
  - { name: stop_task, type: builtin }
  - { name: list_triggers, type: builtin }

subagents:
  - { name: explore, type: builtin }
  - { name: plan, type: builtin }
  - { name: worker, type: builtin }
  - { name: critic, type: builtin }
  - { name: summarize, type: builtin }
  - { name: research, type: builtin }

output:
  type: stdout
  controller_direct: true
